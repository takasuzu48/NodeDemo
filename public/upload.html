<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Upload – FileAI v1.7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f; --panel: #111418; --border: #1e2530;
    --accent: #00e5a0; --del: #ff3b5c; --warn: #f59e0b;
    --text: #e2e8f0; --muted: #4a5568; --code: #a8b8cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  .logo { font-size: 18px; font-weight: 800; }
  .logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 8px; }
  .nav-link {
    font-size: 13px; color: var(--muted); text-decoration: none;
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; transition: all 0.15s;
  }
  .nav-link:hover { color: var(--text); border-color: var(--accent); }
  .nav-current { font-size:13px; color:var(--accent); padding:6px 14px; border:1px solid rgba(0,229,160,0.3); border-radius:6px; font-weight:700; }
  .ver-badge-header { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; color:var(--accent); background:rgba(0,229,160,0.1); border:1px solid rgba(0,229,160,0.25); padding:2px 10px; border-radius:20px; margin-left:8px; vertical-align:middle; }

  .page { max-width: 680px; margin: 48px auto; padding: 0 24px 60px; }
  h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 36px; }

  .dropzone {
    border: 2px dashed var(--border); border-radius: 16px;
    padding: 48px 24px; text-align: center; cursor: pointer;
    transition: all 0.2s; position: relative; background: var(--panel);
  }
  .dropzone:hover, .dropzone.drag-over { border-color: var(--accent); background: rgba(0,229,160,0.04); }
  .dropzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 40px; margin-bottom: 12px; }
  .drop-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .drop-sub { font-size: 13px; color: var(--muted); }

  .file-info { display: none; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-top: 16px; }
  .file-info.show { display: flex; align-items: center; gap: 16px; }
  .file-icon { font-size: 28px; }
  .file-details { flex: 1; }
  .file-name { font-weight: 700; font-size: 15px; word-break: break-all; }
  .file-meta { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 4px; }
  .file-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; transition: color 0.15s; }
  .file-remove:hover { color: var(--del); }

  .btn-upload {
    width: 100%; margin-top: 20px; padding: 16px;
    background: var(--accent); color: #000; border: none; border-radius: 12px;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-upload:hover:not(:disabled) { background: #00ffb3; transform: translateY(-1px); }
  .btn-upload:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  .progress-wrap { display: none; margin-top: 20px; }
  .progress-wrap.show { display: block; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .progress-label span { font-family: 'JetBrains Mono', monospace; }
  .progress-bar-bg { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; width: 0%; transition: width 0.3s; }

  .steps { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
  .step {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--panel); font-size: 14px; transition: all 0.2s;
  }
  .step-icon { font-size: 16px; width: 24px; text-align: center; }
  .step-label { flex: 1; }
  .step-status { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
  .step.pending { opacity: 0.5; }
  .step.active { border-color: var(--warn); background: rgba(245,158,11,0.05); }
  .step.active .step-status { color: var(--warn); }
  .step.done { border-color: rgba(0,229,160,0.3); background: rgba(0,229,160,0.05); }
  .step.done .step-status { color: var(--accent); }
  .step.error { border-color: rgba(255,59,92,0.3); background: rgba(255,59,92,0.05); }
  .step.error .step-status { color: var(--del); }

  .result-box { display: none; margin-top: 20px; border-radius: 12px; padding: 20px; border: 1px solid rgba(0,229,160,0.3); background: rgba(0,229,160,0.05); }
  .result-box.show { display: block; }
  .result-box.error-box { border-color: rgba(255,59,92,0.3); background: rgba(255,59,92,0.05); }
  .result-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .result-title.err { color: var(--del); }
  .result-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .result-key { color: var(--muted); min-width: 100px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .result-val { color: var(--code); font-family: 'JetBrains Mono', monospace; font-size: 12px; word-break: break-all; }
  .result-val.accent { color: var(--accent); font-weight: 700; }

  .btn-reset {
    margin-top: 16px; padding: 10px 20px; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); color: var(--text); border-radius: 8px;
    cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; transition: all 0.15s;
  }
  .btn-reset:hover { background: rgba(255,255,255,0.1); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; }
</style>
</head>
<body>

<header>
  <div class="logo">API <span>TEST</span> SERVER</div>
  <div class="nav-links">
    <a href="/" class="nav-link">← Top</a>
    <a href="/webhook.html" class="nav-link">Webhook V1</a>
    <a href="/webhookv2.html" class="nav-link">Webhook V2</a>
    <span class="nav-current">Upload</span>
  </div>
</header>

<div class="page">
  <h1>FILE <span>UPLOAD</span> <span class="ver-badge-header">v1.7</span></h1>
  <div class="subtitle">ローカルファイルを選択して FileAI にアップロードします</div>

  <div class="dropzone" id="dropzone">
    <input type="file" id="file-input">
    <div class="drop-icon">📂</div>
    <div class="drop-title">ファイルをドロップ、またはクリックして選択</div>
    <div class="drop-sub">PDF、画像、Excel など各種ファイルに対応</div>
  </div>

  <div class="file-info" id="file-info">
    <div class="file-icon" id="file-icon">📄</div>
    <div class="file-details">
      <div class="file-name" id="file-name">—</div>
      <div class="file-meta" id="file-meta">—</div>
    </div>
    <button class="file-remove" onclick="resetFile()">✕</button>
  </div>

  <button class="btn-upload" id="btn-upload" disabled onclick="startUpload()">
    ファイルを選択してください
  </button>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-label-text">アップロード中...</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <div class="steps" id="steps" style="display:none;">
    <div class="step pending" id="step1">
      <span class="step-icon">🔑</span>
      <span class="step-label">STEP 1 — サーバー経由で Presigned URL を取得</span>
      <span class="step-status" id="step1-status">待機中</span>
    </div>
    <div class="step pending" id="step2">
      <span class="step-icon">📤</span>
      <span class="step-label">STEP 2 — FileAI ストレージへアップロード</span>
      <span class="step-status" id="step2-status">待機中</span>
    </div>
  </div>

  <div class="result-box" id="result-box">
    <div class="result-title" id="result-title">✅ アップロード完了</div>
    <div class="result-row"><span class="result-key">uploadId</span><span class="result-val accent" id="res-uploadId">—</span></div>
    <div class="result-row"><span class="result-key">fileName</span><span class="result-val" id="res-fileName">—</span></div>
    <div class="result-row"><span class="result-key">fileType</span><span class="result-val" id="res-fileType">—</span></div>
    <button class="btn-reset" onclick="resetAll()">別のファイルをアップロード</button>
  </div>
</div>

<script>
  let selectedFile = null;

  const fileInput = document.getElementById('file-input');
  const dropzone  = document.getElementById('dropzone');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFileSelect(fileInput.files[0]);
  });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]);
  });

  function getFileIcon(type) {
    if (type.includes('pdf'))   return '📕';
    if (type.includes('image')) return '🖼️';
    if (type.includes('excel') || type.includes('spreadsheet')) return '📊';
    if (type.includes('word')  || type.includes('document'))    return '📝';
    return '📄';
  }
  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
    return (b/1024/1024).toFixed(2) + ' MB';
  }

  function handleFileSelect(file) {
    selectedFile = file;
    document.getElementById('file-info').classList.add('show');
    document.getElementById('file-icon').textContent = getFileIcon(file.type);
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-meta').textContent = `${file.type || '不明'} · ${formatSize(file.size)}`;
    const btn = document.getElementById('btn-upload');
    btn.disabled = false;
    btn.innerHTML = '📤 アップロード開始';
  }

  function resetFile() {
    selectedFile = null; fileInput.value = '';
    document.getElementById('file-info').classList.remove('show');
    const btn = document.getElementById('btn-upload');
    btn.disabled = true;
    btn.innerHTML = 'ファイルを選択してください';
  }

  async function startUpload() {
    if (!selectedFile) return;

    document.getElementById('btn-upload').disabled = true;
    document.getElementById('btn-upload').innerHTML = '<span class="spinner"></span> 処理中...';
    document.getElementById('steps').style.display = 'flex';
    document.getElementById('result-box').classList.remove('show', 'error-box');
    document.getElementById('progress-wrap').classList.remove('show');
    setStep(1, 'active', '取得中...');
    setStep(2, 'pending', '待機中');

    try {
      // ── STEP 1: サーバー経由でPresigned URLを取得 ──
      const metaRes = await fetch('/proxy/upload/init', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fileName: selectedFile.name,
          fileType: selectedFile.type || 'application/octet-stream'
        })
      });
      const metaJson = await metaRes.json();
      if (!metaRes.ok || !metaJson.success) {
        throw new Error(metaJson.message || 'Presigned URL取得失敗');
      }
      const { presignedUploadURL, uploadId } = metaJson.data;
      setStep(1, 'done', '取得完了');

      // ── STEP 2: サーバー経由でS3にアップロード ──
      setStep(2, 'active', 'アップロード中...');
      document.getElementById('progress-wrap').classList.add('show');
      await uploadViaProxy(presignedUploadURL, selectedFile, metaJson.data.fileType);
      setStep(2, 'done', '完了');
      setProgress(100, 'アップロード完了');

      // 結果表示
      const box = document.getElementById('result-box');
      box.classList.add('show'); box.classList.remove('error-box');
      document.getElementById('result-title').textContent = '✅ アップロード完了';
      document.getElementById('result-title').className = 'result-title';
      document.getElementById('res-uploadId').textContent = uploadId || '—';
      document.getElementById('res-fileName').textContent = selectedFile.name;
      document.getElementById('res-fileType').textContent = selectedFile.type || 'application/octet-stream';
      document.getElementById('btn-upload').innerHTML = '✅ 完了';

    } catch (err) {
      console.error(err);
      document.querySelectorAll('.step.active').forEach(s => {
        s.classList.replace('active', 'error');
        s.querySelector('.step-status').textContent = 'エラー';
      });
      const box = document.getElementById('result-box');
      box.classList.add('show', 'error-box');
      document.getElementById('result-title').textContent = '❌ エラーが発生しました';
      document.getElementById('result-title').className = 'result-title err';
      document.getElementById('res-uploadId').textContent = '—';
      document.getElementById('res-fileName').textContent = err.message;
      document.getElementById('res-fileType').textContent = '—';
      document.getElementById('btn-upload').disabled = false;
      document.getElementById('btn-upload').innerHTML = '↺ 再試行';
    }
  }

  // STEP2: FormDataでサーバーに送信 → サーバーがS3にPUT
  async function uploadViaProxy(presignedUploadURL, file, fileType) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('presignedUploadURL', presignedUploadURL);
    formData.append('fileType', fileType || file.type || 'application/octet-stream');

    // プログレスはXHRで取得
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/proxy/upload/put');
      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          const pct = Math.round(e.loaded / e.total * 100);
          setProgress(pct, `${formatSize(e.loaded)} / ${formatSize(e.total)}`);
        }
      });
      xhr.addEventListener('load', () => {
        try {
          const result = JSON.parse(xhr.responseText);
          if (xhr.status >= 200 && xhr.status < 300 && result.success) {
            resolve(result);
          } else {
            reject(new Error(result.message || `アップロード失敗 (${xhr.status})`));
          }
        } catch {
          reject(new Error(`レスポンス解析エラー (${xhr.status})`));
        }
      });
      xhr.addEventListener('error', () => reject(new Error('ネットワークエラー')));
      xhr.send(formData);
    });
  }

  function setStep(n, state, text) {
    document.getElementById('step'+n).className = 'step ' + state;
    document.getElementById('step'+n+'-status').textContent = text;
  }
  function setProgress(pct, label) {
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-label-text').textContent = label;
  }
  function resetAll() {
    resetFile();
    document.getElementById('steps').style.display = 'none';
    document.getElementById('result-box').classList.remove('show', 'error-box');
    document.getElementById('progress-wrap').classList.remove('show');
  }
</script>
</body>
</html>
